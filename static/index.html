<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LAN Scout · 局域网服务导航</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel-2: #1d212b; --line: #272c38;
    --text: #e6e9ef; --muted: #8b93a7; --accent: #4f8cff; --accent-2: #2dd4bf;
    --up: #34d399; --down: #6b7280; --warn: #fbbf24; --danger: #f87171;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, "PingFang SC", sans-serif;
  }
  a { color: inherit; }
  header {
    position: sticky; top: 0; z-index: 10; backdrop-filter: blur(10px);
    background: rgba(15,17,21,.82); border-bottom: 1px solid var(--line);
    padding: 14px 24px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
  .logo { width: 26px; height: 26px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
  .meta { color: var(--muted); font-size: 13px; display: flex; gap: 16px; flex-wrap: wrap; }
  .meta b { color: var(--text); font-weight: 600; }
  .spacer { flex: 1; }
  .search { background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    padding: 9px 14px; border-radius: 10px; min-width: 220px; outline: none; }
  .search:focus { border-color: var(--accent); }
  button.scan {
    background: var(--accent); color: #fff; border: 0; padding: 10px 18px;
    border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px;
  }
  button.scan:disabled { opacity: .55; cursor: progress; }
  main { padding: 22px 24px 60px; max-width: 1500px; margin: 0 auto; }
  .stats { display: flex; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 18px; min-width: 120px; }
  .stat .n { font-size: 26px; font-weight: 700; }
  .stat .l { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .grid { display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
  .card.down { opacity: .5; }
  .card .top { display: flex; align-items: flex-start; gap: 10px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 7px; flex: none;
    background: var(--up); box-shadow: 0 0 8px var(--up); }
  .card.down .dot { background: var(--down); box-shadow: none; }
  .ip { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .host-sub { color: var(--muted); font-size: 12.5px; word-break: break-all; }
  .label-input { background: transparent; border: 0; border-bottom: 1px dashed transparent;
    color: var(--accent-2); font-weight: 600; font-size: 14px; outline: none; width: 100%;
    padding: 2px 0; }
  .label-input::placeholder { color: var(--muted); font-weight: 400; }
  .label-input:hover, .label-input:focus { border-bottom-color: var(--line); }
  .services { display: flex; flex-wrap: wrap; gap: 8px; }
  .svc { display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px;
    padding: 6px 10px; font-size: 13px; }
  .svc.link { border-color: #2e3d5c; }
  .svc.link:hover { border-color: var(--accent); background: #20283a; }
  .svc .port { font-weight: 700; font-variant-numeric: tabular-nums; }
  .svc .name { color: var(--muted); }
  .svc .arrow { color: var(--accent); }
  .no-svc { color: var(--muted); font-size: 12.5px; }
  .empty { text-align: center; color: var(--muted); padding: 80px 20px; }
  .banner { background: #3a1d1d; border: 1px solid var(--danger); color: #fca5a5;
    padding: 12px 16px; border-radius: 10px; margin-bottom: 18px; }
  .vendor { color: var(--muted); font-size: 11.5px; }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="logo"></span> LAN Scout</div>
  <div class="meta" id="meta"></div>
  <span class="spacer"></span>
  <input class="search" id="search" placeholder="搜索 IP / 名称 / 服务 / 厂商…">
  <button class="scan" id="scanBtn" onclick="triggerScan()">立即扫描</button>
</header>
<main>
  <div id="banner"></div>
  <div class="stats" id="stats"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">还没有数据。点击「立即扫描」开始探测局域网。</div>
</main>

<script>
let STATE = { hosts: [], config: {}, scanning: false };
let pollTimer = null;

const WEB = { http: "http", https: "https", "https-alt": "https",
  "http-proxy": "http", "http-alt": "http", "ssl/http": "https",
  ssl: "https", caldav: "http", webcache: "http" };
// Ports we know are web UIs even when nmap can't name the service.
const WEB_PORTS = new Set([80,81,443,3000,5000,5001,5601,7860,8000,8006,8008,
  8080,8081,8086,8088,8096,8123,8443,8888,9000,9001,9090,9443,3128,32400,8500,15672]);
const HTTPS_PORTS = new Set([443,8443,9443,8006,6443]);

function svcUrl(ip, s) {
  const name = (s.name || "").toLowerCase();
  let scheme = WEB[name];
  if (!scheme && WEB_PORTS.has(s.port)) scheme = HTTPS_PORTS.has(s.port) ? "https" : "http";
  if (!scheme) return null;
  return `${scheme}://${ip}:${s.port}`;
}

async function load() {
  try {
    const r = await fetch("/api/state");
    STATE = await r.json();
    render();
  } catch (e) { /* ignore transient */ }
}

function fmtTime(t) {
  if (!t) return "—";
  const d = new Date(t * 1000), p = n => String(n).padStart(2, "0");
  return `${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

function render() {
  const c = STATE.config || {};
  const ls = STATE.last_scan;
  const upCount = STATE.hosts.filter(h => h.is_up).length;
  const svcCount = STATE.hosts.reduce((a, h) => a + (h.services?.length || 0), 0);

  document.getElementById("meta").innerHTML =
    `网段 <b>${c.subnet || "?"}</b> · 上次扫描 <b>${fmtTime(ls?.finished_at)}</b>` +
    (c.interval ? ` · 自动每 <b>${Math.round(c.interval/60)}</b> 分钟` : "");

  const btn = document.getElementById("scanBtn");
  btn.disabled = STATE.scanning;
  btn.textContent = STATE.scanning ? "扫描中…" : "立即扫描";

  // poll faster while a scan runs
  clearInterval(pollTimer);
  pollTimer = setInterval(load, STATE.scanning ? 1500 : 8000);

  let banner = "";
  if (!STATE.nmap_available)
    banner = `<div class="banner">未检测到 nmap，无法扫描。请先安装：<code>brew install nmap</code></div>`;
  else if (ls?.error)
    banner = `<div class="banner">上次扫描失败：${ls.error}</div>`;
  document.getElementById("banner").innerHTML = banner;

  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="n">${upCount}</div><div class="l">在线主机</div></div>
    <div class="stat"><div class="n">${svcCount}</div><div class="l">开放服务</div></div>
    <div class="stat"><div class="n">${STATE.hosts.length}</div><div class="l">已知设备</div></div>`;

  const q = document.getElementById("search").value.trim().toLowerCase();
  const hosts = STATE.hosts.filter(h => !q || hostMatches(h, q));

  document.getElementById("empty").style.display = hosts.length ? "none" : "block";
  document.getElementById("grid").innerHTML = hosts.map(hostCard).join("");
}

function hostMatches(h, q) {
  const hay = [h.ip, h.hostname, h.label, h.note, h.vendor,
    ...(h.services||[]).flatMap(s => [s.name, s.product, String(s.port)])]
    .filter(Boolean).join(" ").toLowerCase();
  return hay.includes(q);
}

function esc(s) { return (s ?? "").replace(/[&<>"]/g, m =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m])); }

function hostCard(h) {
  const services = (h.services || []).map(s => {
    const url = h.is_up ? svcUrl(h.ip, s) : null;
    const desc = [s.product, s.version].filter(Boolean).join(" ");
    const inner = `<span class="port">${s.port}</span>` +
      (s.name ? `<span class="name">${esc(s.name)}</span>` : "") +
      (url ? `<span class="arrow">↗</span>` : "");
    const title = desc ? ` title="${esc(desc)}"` : "";
    return url
      ? `<a class="svc link" href="${url}" target="_blank" rel="noopener"${title}>${inner}</a>`
      : `<span class="svc"${title}>${inner}</span>`;
  }).join("");

  const sub = [h.hostname, h.mac].filter(Boolean).map(esc).join(" · ");
  return `
  <div class="card ${h.is_up ? "" : "down"}">
    <div class="top">
      <span class="dot"></span>
      <div style="flex:1; min-width:0">
        <input class="label-input" placeholder="未命名设备"
          value="${esc(h.label || "")}"
          onchange="saveLabel('${h.ip}', this.value)">
        <div class="ip">${h.ip}</div>
        ${sub ? `<div class="host-sub">${sub}</div>` : ""}
        ${h.vendor ? `<div class="vendor">${esc(h.vendor)}</div>` : ""}
      </div>
    </div>
    ${services
      ? `<div class="services">${services}</div>`
      : `<div class="no-svc">${h.is_up ? "无开放端口" : "离线"}</div>`}
  </div>`;
}

async function saveLabel(ip, label) {
  await fetch("/api/host/" + ip, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ label }),
  });
}

async function triggerScan() {
  document.getElementById("scanBtn").disabled = true;
  await fetch("/api/scan", { method: "POST" });
  setTimeout(load, 600);
}

document.getElementById("search").addEventListener("input", render);
load();
</script>
</body>
</html>
