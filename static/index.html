<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LAN Scout · 局域网服务导航</title>
<script>
  (function() {
    const root = document.documentElement;
    const style = localStorage.getItem('ui_style') || 'cyberpunk';
    const mode = localStorage.getItem('ui_mode') || 'auto';
    if (style === 'minimal') root.classList.add('theme-minimal');
    else if (style === 'bento') root.classList.add('theme-bento');
    if (mode === 'dark') root.classList.add('dark-theme');
    else if (mode === 'light') root.classList.add('light-theme');
  })();
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

  /* ══════ Cyberpunk Dark (default) ══════ */
  :root {
    --bg: #0a0b10; --panel: rgba(0,255,136,.02); --panel-2: rgba(0,255,136,.04); --line: rgba(0,255,136,.10);
    --text: #c8d0d8; --muted: #3a4550; --accent: #00ff88; --accent-2: #00d4ff;
    --up: #00ff88; --down: #334; --danger: #ff3b5c; --radius: 4px;
    --banner-bg: rgba(255,59,92,.08); --banner-text: #ff6b8a;
    --svc-hover: rgba(0,255,136,.06);
    --ct-border: #00ff88;
    --cport-bg: rgba(0,255,136,.06); --cport-border: rgba(0,255,136,.15);
    --header-bg: rgba(10,11,16,.92);
    --glow: rgba(0,255,136,.12);
    --mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
    --scan: rgba(0,255,136,.8);
    --modal-bg: #0d0e14;
    --font: var(--mono);
    --tab-on-bg: rgba(0,255,136,.08); --tab-on-color: var(--accent); --tab-on-shadow: none;
    --btn-primary-bg: rgba(0,255,136,.08); --btn-primary-color: var(--accent); --btn-primary-border: rgba(0,255,136,.3);
  }

  /* Cyberpunk Light */
  @media (prefers-color-scheme: light) {
    :root:not(.dark-theme):not(.theme-minimal):not(.theme-bento) {
      --bg: #f0f2ec; --panel: rgba(0,140,80,.03); --panel-2: rgba(0,140,80,.05); --line: rgba(0,140,80,.12);
      --text: #1a2018; --muted: #7a8a70; --accent: #00a855; --accent-2: #0090b8;
      --up: #00a855; --down: #c8d0c0; --danger: #d03020;
      --banner-bg: rgba(208,48,32,.06); --banner-text: #d03020;
      --svc-hover: rgba(0,168,85,.06);
      --ct-border: #00a855;
      --cport-bg: rgba(0,168,85,.06); --cport-border: rgba(0,168,85,.15);
      --header-bg: rgba(240,242,236,.92);
      --glow: rgba(0,168,85,.10);
      --scan: rgba(0,168,85,.8);
      --modal-bg: #f0f2ec;
      --tab-on-bg: rgba(0,168,85,.08); --btn-primary-bg: rgba(0,168,85,.08); --btn-primary-border: rgba(0,168,85,.3);
    }
  }
  :root.light-theme:not(.theme-minimal):not(.theme-bento) {
    --bg: #f0f2ec; --panel: rgba(0,140,80,.03); --panel-2: rgba(0,140,80,.05); --line: rgba(0,140,80,.12);
    --text: #1a2018; --muted: #7a8a70; --accent: #00a855; --accent-2: #0090b8;
    --up: #00a855; --down: #c8d0c0; --danger: #d03020;
    --banner-bg: rgba(208,48,32,.06); --banner-text: #d03020;
    --svc-hover: rgba(0,168,85,.06);
    --ct-border: #00a855;
    --cport-bg: rgba(0,168,85,.06); --cport-border: rgba(0,168,85,.15);
    --header-bg: rgba(240,242,236,.92);
    --glow: rgba(0,168,85,.10);
    --scan: rgba(0,168,85,.8);
    --modal-bg: #f0f2ec;
    --tab-on-bg: rgba(0,168,85,.08); --btn-primary-bg: rgba(0,168,85,.08); --btn-primary-border: rgba(0,168,85,.3);
  }

  /* ══════ Minimal Light (default for minimal) ══════ */
  :root.theme-minimal {
    --bg: #f6f7fb; --panel: #ffffff; --panel-2: #eef0f6; --line: #dfe2eb;
    --text: #1e2030; --muted: #8389a3; --accent: #5b5fc7; --accent-2: #0ea5e9;
    --up: #10b981; --down: #94a3b8; --danger: #ef4444; --radius: 12px;
    --banner-bg: #fef2f2; --banner-text: #b91c1c;
    --svc-hover: #e8eaf2;
    --ct-border: #5b5fc7;
    --cport-bg: #eef2ff; --cport-border: #c7d2fe;
    --header-bg: rgba(246,247,251,.88);
    --glow: rgba(91,95,199,.10);
    --scan: rgba(91,95,199,.8);
    --modal-bg: #f6f7fb;
    --font: -apple-system, "Segoe UI", Roboto, "PingFang SC", "Noto Sans SC", sans-serif;
    --tab-on-bg: var(--accent); --tab-on-color: #fff; --tab-on-shadow: 0 1px 4px var(--glow);
    --btn-primary-bg: var(--accent); --btn-primary-color: #fff; --btn-primary-border: var(--accent);
  }

  /* Minimal Dark */
  @media (prefers-color-scheme: dark) {
    :root.theme-minimal:not(.light-theme) {
      --bg: #07080e; --panel: rgba(255,255,255,.04); --panel-2: rgba(255,255,255,.06); --line: rgba(255,255,255,.08);
      --text: #dfe3f0; --muted: #5f6480; --accent: #7c80f0; --accent-2: #38bdf8;
      --up: #34d399; --down: #475569; --danger: #f87171;
      --banner-bg: #2a1215; --banner-text: #fca5a5;
      --svc-hover: rgba(255,255,255,.06);
      --ct-border: #7c80f0;
      --cport-bg: rgba(124,128,240,.08); --cport-border: rgba(124,128,240,.20);
      --header-bg: rgba(7,8,14,.80);
      --glow: rgba(124,128,240,.10);
      --modal-bg: #0a0b12;
    }
  }
  :root.theme-minimal.dark-theme {
    --bg: #07080e; --panel: rgba(255,255,255,.04); --panel-2: rgba(255,255,255,.06); --line: rgba(255,255,255,.08);
    --text: #dfe3f0; --muted: #5f6480; --accent: #7c80f0; --accent-2: #38bdf8;
    --up: #34d399; --down: #475569; --danger: #f87171;
    --banner-bg: #2a1215; --banner-text: #fca5a5;
    --svc-hover: rgba(255,255,255,.06);
    --ct-border: #7c80f0;
    --cport-bg: rgba(124,128,240,.08); --cport-border: rgba(124,128,240,.20);
    --header-bg: rgba(7,8,14,.80);
    --glow: rgba(124,128,240,.10);
    --modal-bg: #0a0b12;
  }

  /* ══════ Bento Light (default for bento) ══════ */
  :root.theme-bento {
    --bg: #f5f0eb; --panel: #ffffff; --panel-2: #efe8e0; --line: #e0d5c8;
    --text: #2c1e10; --muted: #9a8878; --accent: #e06030; --accent-2: #c04820;
    --up: #2d9a5a; --down: #b8b0a8; --danger: #d03838; --radius: 16px;
    --banner-bg: #fef0f0; --banner-text: #c02020;
    --svc-hover: rgba(224,96,48,.06);
    --ct-border: #e06030;
    --cport-bg: rgba(224,96,48,.06); --cport-border: rgba(224,96,48,.18);
    --header-bg: rgba(245,240,235,.90);
    --glow: rgba(224,96,48,.10);
    --scan: rgba(224,96,48,.8);
    --modal-bg: #f5f0eb;
    --font: "Inter", -apple-system, "Segoe UI", Roboto, "PingFang SC", "Noto Sans SC", sans-serif;
    --tab-on-bg: var(--accent); --tab-on-color: #fff; --tab-on-shadow: 0 2px 8px rgba(224,96,48,.20);
    --btn-primary-bg: var(--accent); --btn-primary-color: #fff; --btn-primary-border: var(--accent);
    --bento-gap: 12px;
  }

  /* Bento Dark */
  @media (prefers-color-scheme: dark) {
    :root.theme-bento:not(.light-theme) {
      --bg: #1a1410; --panel: rgba(255,255,255,.04); --panel-2: rgba(255,200,160,.05); --line: rgba(255,200,160,.08);
      --text: #e8ddd0; --muted: #7a6a58; --accent: #ff7840; --accent-2: #ff6028;
      --up: #40c878; --down: #504840; --danger: #ff5050;
      --banner-bg: rgba(208,56,56,.08); --banner-text: #ff8080;
      --svc-hover: rgba(255,120,64,.06);
      --ct-border: #ff7840;
      --cport-bg: rgba(255,120,64,.06); --cport-border: rgba(255,120,64,.18);
      --header-bg: rgba(26,20,16,.90);
      --glow: rgba(255,120,64,.12);
      --modal-bg: #1e1812;
    }
  }
  :root.theme-bento.dark-theme {
    --bg: #1a1410; --panel: rgba(255,255,255,.04); --panel-2: rgba(255,200,160,.05); --line: rgba(255,200,160,.08);
    --text: #e8ddd0; --muted: #7a6a58; --accent: #ff7840; --accent-2: #ff6028;
    --up: #40c878; --down: #504840; --danger: #ff5050;
    --banner-bg: rgba(208,56,56,.08); --banner-text: #ff8080;
    --svc-hover: rgba(255,120,64,.06);
    --ct-border: #ff7840;
    --cport-bg: rgba(255,120,64,.06); --cport-border: rgba(255,120,64,.18);
    --header-bg: rgba(26,20,16,.90);
    --glow: rgba(255,120,64,.12);
    --modal-bg: #1e1812;
  }

  /* ══════ Base layout (cyberpunk defaults) ══════ */
  * { box-sizing: border-box; margin: 0; }
  html { overflow-y: scroll; }
  body { min-height: calc(100vh + 1px); background: var(--bg); color: var(--text);
    font: 12.5px/1.6 var(--font); }
  a { color: var(--accent); }
  input, select { font: inherit; }
  button { font: inherit; cursor: pointer; }

  header { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: var(--header-bg); border-bottom: 1px solid var(--line);
    padding: 0 24px; height: 44px; display: flex; align-items: center; gap: 14px; }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px;
    color: var(--accent); letter-spacing: 1px; flex-shrink: 0; }
  .logo { width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 20px rgba(0,255,136,.3);
    animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)}50%{opacity:.6;box-shadow:0 0 4px var(--accent)} }
  .meta { color: var(--muted); font-size: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
  .meta b { color: var(--text); font-weight: 600; }
  .spacer { flex: 1; }
  .search { background: transparent; border: 1px solid var(--line); color: var(--text);
    padding: 4px 10px; border-radius: 2px; outline: none; width: 180px; font-size: 11px;
    transition: border-color .15s; }
  .search:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--glow); }
  .search::placeholder { color: var(--muted); }
  .hbtn { background: none; border: 1px solid transparent; color: var(--muted); padding: 3px 8px;
    border-radius: 2px; font-size: 10.5px; transition: all .12s; display: inline-flex; align-items: center; gap: 3px; }
  .hbtn:hover { color: var(--accent); border-color: var(--line); }
  .hbtn.accent { color: var(--accent); font-weight: 600; border: 1px solid var(--line); }
  .hbtn.accent:hover { background: var(--svc-hover); box-shadow: 0 0 8px var(--glow); }
  .hbtn.accent:disabled { opacity: .4; }

  main { padding: 16px 24px 60px; max-width: 1480px; margin: 0 auto; }
  .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }

  .tabs { display: inline-flex; gap: 0; border: 1px solid var(--line); border-radius: 2px; overflow: hidden; }
  .tabs button { background: none; border: 0; color: var(--muted); padding: 4px 14px;
    font-size: 11px; font-weight: 400; transition: all .12s; border-right: 1px solid var(--line); }
  .tabs button:last-child { border-right: 0; }
  .tabs button.on { background: var(--tab-on-bg); color: var(--tab-on-color); font-weight: 600; box-shadow: var(--tab-on-shadow); }

  .toggle { display: inline-flex; align-items: center; gap: 4px; color: var(--muted); font-size: 10.5px; }
  select.ctl { background: transparent; border: 1px solid var(--line); color: var(--text);
    padding: 4px 6px; border-radius: 2px; outline: none; font-size: 10.5px; }

  .stats { display: flex; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; align-items: baseline;
    padding-bottom: 10px; border-bottom: 1px solid var(--line); }
  .stat { display: flex; align-items: baseline; gap: 4px; }
  .stat .n { font-size: 22px; font-weight: 600; color: var(--accent); text-shadow: 0 0 12px var(--glow); }
  .stat .l { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }

  .catfilter { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .catchip { display: inline-flex; align-items: center; gap: 4px; background: transparent;
    border: 1px solid var(--line); color: var(--muted); padding: 3px 10px; border-radius: 2px;
    font-size: 10px; font-weight: 400; transition: all .12s; cursor: pointer; }
  .catchip .sw { width: 5px; height: 5px; border-radius: 1px; }
  .catchip:hover { border-color: var(--accent); color: var(--text); }
  .catchip.on { border-color: var(--accent); color: var(--accent);
    background: var(--svc-hover); }
  .catchip .cnt { font-size: 10px; opacity: .6; }

  .pencil, .del, .ext, .eye { background: none; border: 0; color: var(--muted); padding: 0 2px;
    font-size: 11px; opacity: .3; transition: all .12s; cursor: pointer; }
  .pencil:hover { opacity: 1; color: var(--accent); }
  .del:hover { opacity: 1; color: var(--danger); }
  .ext:hover { opacity: 1; color: var(--accent-2); }
  .ext.active { opacity: 1 !important; color: var(--accent-2) !important; }
  .eye:hover { opacity: 1; color: var(--text); }

  .catpick { background: transparent; color: var(--muted); border: 1px solid var(--line);
    border-radius: 2px; font-size: 10px; padding: 1px 4px; max-width: 80px; }
  .catpick:hover { color: var(--accent); border-color: var(--accent); }

  .apps { display: grid; gap: 8px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  .app { position: relative; display: flex; flex-direction: column; gap: 4px; text-decoration: none;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 12px 14px; transition: all .15s; }
  .app::before { content: none; }
  .app:hover { border-color: var(--accent); box-shadow: 0 0 15px var(--glow), inset 0 0 30px var(--panel); }
  .app.hidden { opacity: .3; border-style: dashed; }
  .app .an { font-weight: 600; font-size: 13px; color: var(--text); padding-right: 50px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .app .acts { position: absolute; top: 4px; right: 6px; display: flex; gap: 2px; opacity: 0; transition: opacity .12s; }
  .app:hover .acts { opacity: 1; }
  .app .catpick { background: transparent; }

  .cat-section { margin-bottom: 20px; }
  .cat-head { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; padding-left: 2px; }
  .cat-head .swatch { width: 2px; height: 12px; border-radius: 0; }
  .cat-head h2 { font-size: 10px; margin: 0; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
  .cat-head .count { color: var(--muted); font-size: 10px; opacity: .6; }

  .grid { display: grid; gap: 8px; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; transition: all .15s; }
  .card:hover { border-color: var(--accent); }
  .card .top { display: flex; align-items: flex-start; gap: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; flex: none;
    background: var(--up); box-shadow: 0 0 6px var(--accent); animation: pulse 2s ease-in-out infinite; }
  .card.down .dot { background: var(--down); box-shadow: none; animation: none; }
  .ip { font-size: 14px; font-weight: 600; color: var(--accent); }
  .host-sub { color: var(--muted); font-size: 10px; word-break: break-all; }
  .vendor { color: var(--muted); font-size: 10px; }
  .label-input { background: transparent; border: 0; border-bottom: 1px dashed transparent;
    color: var(--accent-2); font-weight: 600; font-size: 11px; outline: none; width: 100%; padding: 1px 0; }
  .label-input::placeholder { color: var(--muted); font-weight: 400; }
  .label-input:hover, .label-input:focus { border-bottom-color: var(--accent); }
  .services { display: flex; flex-wrap: wrap; gap: 4px; }
  .svc { display: inline-flex; align-items: center; gap: 4px; text-decoration: none;
    background: transparent; border: 1px solid var(--line); border-left: 2px solid;
    border-radius: 2px; padding: 4px 7px; font-size: 11px; transition: all .12s; }
  .svc.link:hover { background: var(--svc-hover); border-color: var(--accent); }
  .svc.hidden { opacity: .3; border-style: dashed; }
  .svc .port { font-weight: 600; font-size: 11px; color: var(--accent); }
  .svc .name { color: var(--accent-2); font-weight: 400; }
  .svc .ver { color: var(--muted); font-size: 9.5px; } .svc .arrow { margin-left: 1px; opacity: .4; }
  .no-svc { color: var(--muted); font-size: 11px; }

  .containers { border-top: 1px solid var(--line); padding-top: 8px; }
  .ct-head { font-size: 9px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .ct-list { display: flex; flex-direction: column; gap: 3px; max-height: 280px; overflow: auto; }
  .ct { display: grid; grid-template-columns: 1fr auto; gap: 2px 6px; align-items: baseline;
    padding: 4px 7px; background: var(--panel-2); border-radius: 2px; border-left: 2px solid var(--ct-border);
    transition: all .12s; }
  .ct:hover { background: var(--svc-hover); }
  .ct-name { font-weight: 600; font-size: 11px; word-break: break-all; display: inline-flex; align-items: center; gap: 3px; }
  .ct.stopped { opacity: .4; border-left-color: var(--down); }
  .ct-img { color: var(--muted); font-size: 9px; grid-column: 1; word-break: break-all; }
  .ct-ports { grid-row: 1 / span 2; display: flex; flex-wrap: wrap; gap: 3px; justify-content: flex-end; }
  .btn-ct-ctrl { background: none; border: none; cursor: pointer; padding: 0; line-height: 1;
    font-size: 10px; opacity: .3; transition: opacity .12s; flex-shrink: 0; }
  .btn-ct-ctrl:hover { opacity: 1; }
  .ct:hover .btn-ct-ctrl { opacity: .6; }
  .btn-ct-ctrl.start { color: var(--up); }
  .btn-ct-ctrl.stop { color: var(--danger); }
  .cport { font-size: 10px; text-decoration: none; background: var(--cport-bg); border: 1px solid var(--cport-border);
    border-radius: 2px; padding: 1px 5px; white-space: nowrap; color: var(--accent); transition: all .12s; }
  .cport:hover { border-color: var(--accent); box-shadow: 0 0 6px var(--glow); }
  .cport.int { background: transparent; border-color: var(--line); color: var(--muted); }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 11px; }
  .banner { background: var(--banner-bg); border: 1px solid var(--danger); color: var(--banner-text);
    padding: 8px 12px; border-radius: 2px; margin-bottom: 12px; font-size: 11px; }

  .ds-pills { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-variant-numeric: tabular-nums; }
  .ds-pill { display: inline-flex; align-items: center; gap: 2px; padding: 1px 5px; border-radius: 2px;
    font-weight: 600; font-size: 9.5px; line-height: 1.5; white-space: nowrap; }
  .ds-pill .ds-lbl { font-weight: 600; font-size: 8px; text-transform: uppercase; opacity: .5; }
  .ds-pill.ok   { background: var(--svc-hover); color: var(--accent); }
  .ds-pill.warn { background: rgba(255,180,0,.08); color: #ffb400; }
  .ds-pill.crit { background: rgba(255,59,92,.08); color: var(--danger); }
  .ds-stopped { font-size: 10px; color: var(--muted); }

  .app-url-line { display: flex; align-items: center; gap: 4px; font-size: 10.5px;
    line-height: 1.3; min-width: 0; }
  .app-url-line a { color: var(--muted); text-decoration: none; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; min-width: 0; font-weight: 400; transition: color .12s; }
  .app-url-line a:hover { color: var(--accent); }
  .app-url-line a.lan-link { font-size: 9.5px; }
  .url-tag { font-size: 7px; font-weight: 600; padding: 1px 4px; border-radius: 1px;
    text-transform: uppercase; flex-shrink: 0; line-height: 1; letter-spacing: .5px; min-width: 22px; text-align: center; }
  .url-tag.wan { background: rgba(0,212,255,.10); color: var(--accent-2); }
  .url-tag.lan { background: var(--svc-hover); color: var(--accent); }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px); display: none;
    align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 50; overflow: auto; }
  .overlay.show { display: flex; }
  .modal { background: var(--modal-bg); border: 1px solid var(--line); border-radius: var(--radius);
    width: 100%; max-width: 720px; padding: 20px; box-shadow: 0 0 40px var(--glow); }

    background: rgba(0,255,136,.3); border-radius: 0; display: block; font-style: normal; }
  .theme-opt .preview-cyber i::after { content: ""; position: absolute; top: 6px; width: 22px; height: 3px;
    background: rgba(0,255,136,.15); }
  .theme-opt .preview-min { background: #f6f7fb; }
  .theme-opt .preview-min::after { content: ""; position: absolute; inset: 0; border: 1px solid #dfe2eb; border-radius: 3px; }
  .theme-opt .preview-min span { position: absolute; left: 8px; top: 8px; width: 16px; height: 16px;
    border-radius: 5px; background: linear-gradient(135deg, #5b5fc7, #0ea5e9); }
  .theme-opt .preview-min i { position: absolute; right: 8px; top: 10px; width: 30px; height: 4px;
    background: #eef0f6; border-radius: 4px; display: block; font-style: normal; }
  .theme-opt .preview-min i::after { content: ""; position: absolute; top: 7px; width: 22px; height: 4px;
    background: #eef0f6; border-radius: 4px; }
  .theme-opt .preview-bento { background: #f5f0eb; }
  .theme-opt .preview-bento::after { content: ""; position: absolute; inset: 0; border-radius: 3px; }
  .theme-opt .preview-bento span { position: absolute; left: 6px; top: 6px; width: 18px; height: 14px;
    border-radius: 4px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .theme-opt .preview-bento span::after { content: ""; position: absolute; left: 3px; top: 3px; width: 4px; height: 8px;
    border-radius: 1px; background: #e06030; opacity: .6; }
  .theme-opt .preview-bento i { position: absolute; left: 28px; top: 6px; width: 28px; height: 14px;
    border-radius: 4px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.08); display: block; font-style: normal; }
  .theme-opt .preview-bento i::after { content: ""; position: absolute; left: 3px; top: 3px; width: 4px; height: 8px;
    border-radius: 1px; background: #e06030; opacity: .4; }
  .theme-opt .preview-bento em { position: absolute; left: 6px; top: 24px; width: 50px; height: 18px;
    border-radius: 4px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.08); display: block; font-style: normal; }
  .theme-opt .tname { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

  @media (max-width: 640px) {
    header { padding: 0 12px; height: 40px; gap: 6px; }
    main { padding: 12px; }
    .apps { grid-template-columns: 1fr; }
    .grid { grid-template-columns: 1fr; }
    .search { width: 120px; }
    .theme-minimal header { padding: 0 14px; height: 46px; gap: 8px; }
    .theme-minimal main { padding: 14px; }
    .theme-minimal .search { width: 140px; }
    .theme-bento header { padding: 0 14px; height: 48px; gap: 8px; }
    .theme-bento main { padding: 14px; }
    .theme-bento .search { width: 140px; }
    .theme-bento .apps { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="logo"></span>LAN Scout</div>
  <div class="meta" id="meta"></div>
  <span class="spacer"></span>
  <input class="search" id="search" placeholder="/ search">
  <button class="hbtn" onclick="openCats()">cat</button>
  <button class="hbtn" id="modeBtn" onclick="toggleMode()">🌙</button>
  <button class="hbtn" onclick="openAddSvc()">+add</button>
  <button class="hbtn" onclick="openSettings()">cfg</button>
  <button class="hbtn accent" id="scanBtn" onclick="triggerScan()">scan</button>
</header>
<main>
  <div id="banner"></div>
  <div class="stats" id="stats"></div>
  <div class="topbar">
    <div class="tabs" id="viewSeg">
      <button data-view="nav" onclick="setView('nav')">导航</button>
      <button data-view="host" onclick="setView('host')">服务</button>
    </div>
    <label class="toggle" id="sortWrap">排序
      <select class="ctl" id="hostSort" onchange="setSort(this.value)">
        <option value="ip">IP</option>
        <option value="label">名称</option>
        <option value="services">服务数</option>
        <option value="last_seen">最近发现</option>
      </select>
    </label>
    <label class="toggle"><input type="checkbox" id="showHidden" onchange="render()"> 显示隐藏</label>
  </div>
  <div class="catfilter" id="catFilter"></div>
  <div id="content"></div>
  <div class="empty" id="empty" style="display:none">还没有数据，点击「扫描」开始探测局域网。</div>
</main>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h2>设置</h2>
    <div class="hint">修改后点「保存」生效；网段/间隔的更改下次扫描时应用。</div>
    <div class="field"><label>扫描目标（网段 / IP / 范围，支持多个，空格或逗号分隔）</label>
      <input type="text" id="f_targets" placeholder="192.168.1.0/24 10.0.0.0/24"></div>
    <div class="field"><label>完整扫描主机（额外用 -Pn + 全端口单独扫，结果合并；适合本机等普扫漏服务的主机）</label>
      <input type="text" id="f_full" placeholder="留空则关闭，如 10.1.6.15"></div>
    <div class="field"><label>手动 Docker 目标（IP:端口，支持多个，空格或逗号分隔；添加后将自动持续对其进行容器和服务扫描）</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="f_docker_hosts" placeholder="例如 10.1.6.15:2375" style="flex:1">
        <button class="btn" id="addDockerBtn" onclick="addDockerAddressFromSettings(event)" style="white-space:nowrap">🐳 探测并添加</button>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>端口列表（逗号分隔，- 表示 top-1000）</label>
        <input type="text" id="f_ports"></div>
      <div class="field"><label>自动扫描间隔（分钟，0 关闭）</label>
        <input type="number" id="f_interval" min="0" step="1"></div>
    </div>
    <div class="row2">
      <div class="field"><label>nmap 计时模板 (0-5)</label>
        <input type="number" id="f_timing" min="0" max="5"></div>
      <div class="field"><label>&nbsp;</label>
        <label class="toggle" style="margin-bottom:8px"><input type="checkbox" id="f_sv"> 服务/版本探测 (-sV)</label>
        <label class="toggle" style="margin-bottom:8px"><input type="checkbox" id="f_pn"> 跳过主机发现 (-Pn) — 扫指定 IP / 不回 ping 的主机时开启</label>
        <label class="toggle"><input type="checkbox" id="f_docker"> 🐳 Docker 探测 — 对开放 2375 的主机直接列出全部容器</label></div>
    </div>
    <div class="field"><label>界面风格</label>
      <div class="theme-row">
        <div class="theme-opt" id="topt_cyberpunk" onclick="setStyle('cyberpunk')">
          <div class="preview preview-cyber"><span></span><i></i></div>
          <div class="tname">Cyberpunk</div>
        </div>
        <div class="theme-opt" id="topt_minimal" onclick="setStyle('minimal')">
          <div class="preview preview-min"><span></span><i></i></div>
          <div class="tname">Minimal</div>
        </div>
        <div class="theme-opt" id="topt_bento" onclick="setStyle('bento')">
          <div class="preview preview-bento"><span></span><i></i><em></em></div>
          <div class="tname">Bento</div>
        </div>
      </div>
    </div>
    <div class="field"><label>明暗模式</label>
      <select id="f_mode" onchange="setMode(this.value)" style="width:auto;background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:5px 8px;border-radius:var(--radius);font-size:11px">
        <option value="auto">🌗 跟随系统</option>
        <option value="light">☀️ 浅色</option>
        <option value="dark">🌙 深色</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSettings()">取消</button>
      <button class="btn primary" onclick="saveSettingsForm()">保存</button>
    </div>
  </div>
</div>

<div class="overlay" id="catOverlay" onclick="if(event.target===this&&!_catDragging)closeCats()">
  <div class="modal">
    <h2>服务分类</h2>
    <div class="hint">分类决定导航页的分组与颜色。一个服务归入第一个匹配其端口或服务名的分类；
      也可以在卡片上用下拉框把某个服务直接指定到分类。👁 可隐藏整类。</div>
    <div id="catEditor"></div>
    <button class="btn" onclick="addCat()">+ 新增分类</button>
    <div class="modal-actions">
      <button class="btn" onclick="closeCats()">取消</button>
      <button class="btn primary" onclick="saveCats()">保存</button>
    </div>
  </div>
</div>

<div class="overlay" id="svcOverlay" onclick="if(event.target===this)closeAddSvc()">
  <div class="modal" style="max-width: 480px">
    <h2>添加自定义服务</h2>
    <div class="hint">手动添加局域网内其他未被扫描到的服务。</div>
    <div class="field"><label>主机 IP</label>
      <input type="text" id="f_svc_ip" placeholder="例如 192.168.1.100"></div>
    <div class="field"><label>端口</label>
      <input type="number" id="f_svc_port" placeholder="例如 80" min="1" max="65535"></div>
    <div class="field"><label>服务名称</label>
      <input type="text" id="f_svc_name" placeholder="例如 我的群晖 / 博客"></div>
    <div class="field"><label>分类</label>
      <select id="f_svc_cat" style="width:100%;padding:6px 8px;border-radius:7px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:13px"></select></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddSvc()">取消</button>
      <button class="btn primary" onclick="submitAddSvc()">添加</button>
    </div>
  </div>
</div>

<script>
let STATE = { hosts: [], settings: null, scanning: false };
let EDIT_CATS = [];
let activeCat = null;   // selected category id for the top filter bar
let pollTimer = null;
const UNCAT = { id: "_other", name: "未分类", color: "#6b7280", order: 9999, visible: true };

const WEB = { http:"http", https:"https", "https-alt":"https", "http-proxy":"http",
  "http-alt":"http", "ssl/http":"https", caldav:"http", webcache:"http" };
const WEB_PORTS = new Set([80,81,443,3000,5000,5001,5601,7860,8000,8006,8008,8080,8081,
  8086,8088,8096,8123,8443,8888,9000,9001,9090,9443,3128,32400,8500,15672,10000]);
const HTTPS_PORTS = new Set([443,8443,9443,8006,6443]);

function svcUrl(ip, s) {
  const key = ip + ":" + s.port;
  if (STATE.settings && STATE.settings.ext_urls && STATE.settings.ext_urls[key]) {
    return STATE.settings.ext_urls[key];
  }
  let scheme = WEB[(s.name||"").toLowerCase()];
  if (!scheme && WEB_PORTS.has(s.port)) scheme = HTTPS_PORTS.has(s.port) ? "https" : "http";
  return scheme ? `${scheme}://${ip}:${s.port}` : null;
}
function esc(s){ return (s ?? "").toString().replace(/[&<>"]/g, m =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[m])); }
function fmtTime(t){ if(!t) return "—"; const d=new Date(t*1000), p=n=>String(n).padStart(2,"0");
  return `${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

function sortedCats(){ return [...(STATE.settings.categories||[])].sort((a,b)=>a.order-b.order); }
function catFor(s){
  const name=(s.name||"").toLowerCase();
  for(const c of sortedCats()){
    if((c.ports||[]).includes(s.port)) return c;
    if((c.services||[]).includes(name)) return c;
  }
  return UNCAT;
}
function isHidden(ip, s){
  const cat = catFor(s);
  if (cat.visible === false) return true;
  return (STATE.settings.hidden||[]).includes(ip+":"+s.port);
}
function svcKey(ip, s){ return ip+":"+s.port; }
function allCats(){ return [...sortedCats(), UNCAT]; }
// Category for a service: a manual per-service assignment wins over the
// port/name rules in catFor().
function catForSvc(ip, s){
  const ov=(STATE.settings.svc_cats||{})[ip+":"+s.port];
  if(ov){ const c=allCats().find(x=>x.id===ov); if(c) return c; }
  return catFor(s);
}
function catPassSvc(ip, s){ return !activeCat || catForSvc(ip,s).id===activeCat; }
async function assignCat(ip, port, catId){
  const m={...(STATE.settings.svc_cats||{})};
  if(catId) m[ip+":"+port]=catId; else delete m[ip+":"+port];
  saveSettings({svc_cats:m});
}
function catSelect(ip, port, curId){
  const def = catFor({port: port});
  const defOpt = `<option value="" ${!curId?"selected":""}>默认 (${def.name})</option>`;
  const opts=allCats().map(c=>`<option value="${c.id}" ${c.id===curId?"selected":""}>${esc(c.name)}</option>`).join("");
  const stop="event.stopPropagation();";
  return `<select class="catpick" title="归类" onclick="${stop}" onmousedown="${stop}"
    onchange="${stop}assignCat('${ip}',${port},this.value)">${defOpt}${opts}</select>`;
}
// Display name: user rename wins, else identified product, else nmap name.
function svcName(ip, s){
  return (STATE.settings.renames||{})[svcKey(ip,s)] || s.product || s.name || "service";
}

async function load(){
  try { STATE = await (await fetch("/api/state")).json(); render(); } catch(e){}
}
async function saveSettings(patch){
  const d = await (await fetch("/api/settings",{method:"POST",
    headers:{"Content-Type":"application/json"}, body:JSON.stringify(patch)})).json();
  STATE.settings = d.settings; render();
}

function setView(v){ document.querySelectorAll("#viewSeg button").forEach(b=>b.classList.toggle("on",b.dataset.view===v));
  saveSettings({view:v}); }
function setSort(v){ saveSettings({host_sort:v}); }
async function toggleHidden(ip, port){
  const key=ip+":"+port, h=new Set(STATE.settings.hidden||[]);
  h.has(key)?h.delete(key):h.add(key); saveSettings({hidden:[...h]});
}
function setCatFilter(id){ activeCat = (activeCat===id) ? null : id; render(); }
async function renameSvc(ip, port){
  const key=ip+":"+port, cur=(STATE.settings.renames||{})[key]||"";
  const name=prompt("服务自定义名称（留空清除）：", cur);
  if (name===null) return;            // cancelled
  const r={...(STATE.settings.renames||{})};
  if (name.trim()) r[key]=name.trim(); else delete r[key];
  saveSettings({renames:r});
}
function renderCatFilter(){
  // Only show categories that have at least one (visible) service present.
  const counts={};
  for(const h of STATE.hosts){ if(!h.is_up) continue;
    for(const s of (h.services||[])){
      if(isHidden(h.ip,s) && !document.getElementById("showHidden").checked) continue;
      const c=catForSvc(h.ip,s); counts[c.id]=(counts[c.id]||0)+1;
    }
  }
  const cats=[...sortedCats(),UNCAT].filter(c=>counts[c.id]);
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  const chips=cats.map(c=>`<button class="catchip ${activeCat===c.id?"on":""}" style="--cc:${c.color}"
      onclick="setCatFilter('${c.id}')"><span class="sw" style="background:${c.color}"></span>${esc(c.name)}
      <span class="cnt">${counts[c.id]}</span></button>`).join("");
  document.getElementById("catFilter").innerHTML = (cats.length>1)
    ? `<button class="catchip ${!activeCat?"on":""}" onclick="setCatFilter(null)">全部 <span class="cnt">${total}</span></button>`+chips
    : "";
}
async function saveLabel(ip, label){
  await fetch("/api/host/"+ip, {method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({label})});
}
async function triggerScan(){ document.getElementById("scanBtn").disabled=true;
  await fetch("/api/scan",{method:"POST"}); setTimeout(load,600); }

let _renderPending = false;
function render(force){
  const active = document.activeElement;
  if (!force && active && active.closest("#content") && (active.tagName === "SELECT" || active.tagName === "INPUT")) {
    _renderPending = true; return;
  }
  _renderPending = false;
  const st = STATE.settings; if(!st) return;
  const ls = STATE.last_scan;
  const showHidden = document.getElementById("showHidden").checked;
  const upCount = STATE.hosts.filter(h=>h.is_up).length;
  const svcCount = STATE.hosts.reduce((a,h)=>a+(h.services||[]).length,0);
  const ctCount = STATE.hosts.reduce((a,h)=>a+(h.containers||[]).length,0);

  document.getElementById("meta").innerHTML =
    `target:<b>${esc(st.targets)}</b> last:<b>${fmtTime(ls?.finished_at)}</b>` +
    (st.interval ? ` interval:<b>${Math.round(st.interval/60)}m</b>` : "");
  const btn=document.getElementById("scanBtn");
  btn.disabled=STATE.scanning; btn.textContent=STATE.scanning?"scanning...":"scan";
  const effView = st.view==="host" ? "host" : "nav";   // legacy "category" → nav
  document.querySelectorAll("#viewSeg button").forEach(b=>b.classList.toggle("on",b.dataset.view===effView));
  document.getElementById("hostSort").value = st.host_sort;
  document.getElementById("sortWrap").style.display = "";

  clearInterval(pollTimer);
  pollTimer=setInterval(load, STATE.scanning?1500:8000);

  let banner="";
  if(!STATE.nmap_available) banner=`<div class="banner">未检测到 nmap，无法扫描。请先安装 nmap。</div>`;
  else if(ls?.error) banner=`<div class="banner">上次扫描失败：${esc(ls.error)}</div>`;
  document.getElementById("banner").innerHTML=banner;

  const detail = st.view==="host";
  const stats=document.getElementById("stats");
  stats.innerHTML = `
    <div class="stat"><span class="n">${upCount}</span><span class="l">hosts</span></div>
    <div class="stat"><span class="n">${svcCount}</span><span class="l">services</span></div>
    ${ctCount?`<div class="stat"><span class="n">${ctCount}</span><span class="l">containers</span></div>`:""}
    <div class="stat"><span class="n">${STATE.hosts.length}</span><span class="l">total</span></div>`;

  renderCatFilter();
  const q=document.getElementById("search").value.trim().toLowerCase();
  const hosts=STATE.hosts.filter(h=>!q||hostMatches(h,q));
  document.getElementById("empty").style.display=hosts.length?"none":"block";
  document.getElementById("content").innerHTML =
    detail ? hostView(hosts, showHidden) : navView(hosts, showHidden);
}

function hostMatches(h,q){
  return [h.ip,h.hostname,h.label,h.note,h.vendor,
    ...(h.services||[]).flatMap(s=>[s.name,s.product,svcName(h.ip,s),String(s.port)]),
    ...(h.containers||[]).flatMap(c=>[c.name,c.image])]
    .filter(Boolean).join(" ").toLowerCase().includes(q);
}

function sortHosts(hosts){
  const k=STATE.settings.host_sort;
  const ipKey=ip=>ip.split(".").map(Number);
  const arr=[...hosts];
  arr.sort((a,b)=>{
    if(a.is_up!==b.is_up) return a.is_up?-1:1;
    if(k==="label") return (a.label||a.hostname||a.ip).localeCompare(b.label||b.hostname||b.ip);
    if(k==="services") return (b.services||[]).length-(a.services||[]).length;
    if(k==="last_seen") return (b.last_seen||0)-(a.last_seen||0);
    const x=ipKey(a.ip),y=ipKey(b.ip);
    for(let i=0;i<4;i++){ if((x[i]||0)!==(y[i]||0)) return (x[i]||0)-(y[i]||0); }
    return 0;
  });
  return arr;
}

function svcChip(ip, s, showHidden){
  const hidden=isHidden(ip,s);
  if(hidden && !showHidden) return "";
  if(!catPassSvc(ip,s)) return "";           // filtered out by the top category bar
  const cat=catForSvc(ip,s), url=svcUrl(ip,s);
  const desc=[s.product,s.version].filter(Boolean).join(" ");
  // Custom rename wins, else identified product, else nmap service name.
  const main=svcName(ip,s);
  
  const key = ip + ":" + s.port;
  const extUrl = (STATE.settings.ext_urls || {})[key];
  const scheme = HTTPS_PORTS.has(s.port) ? "https" : "http";
  const lanUrl = `${scheme}://${ip}:${s.port}`;
  
  // 增强 Tooltip 提示，换行展示 WAN 和 LAN 地址
  const tooltipParts = [];
  if (desc) tooltipParts.push(desc);
  if (extUrl) {
    tooltipParts.push(`广域网外网访问已启用`);
    tooltipParts.push(`WAN (外网): ${extUrl}`);
    tooltipParts.push(`LAN (内网): ${lanUrl}`);
  } else if (url) {
    tooltipParts.push(`LAN (内网): ${lanUrl}`);
  }
  const titleAttr = tooltipParts.length ? `title="${esc(tooltipParts.join("\n"))}"` : "";

  const inner=`<span class="port">${s.port}</span>`+
    (main?`<span class="name">${esc(main)}</span>`:"")+
    (s.version?`<span class="ver">${esc(s.version)}</span>`:"")+
    (extUrl?`<span style="margin-left:2px;font-size:11px" title="广域网外网访问已配置">🌐</span>`:"")+
    (url?`<span class="arrow">↗</span>`:"");
    
  const stop="event.preventDefault();event.stopPropagation();";
  const pen=`<button class="pencil" title="重命名" onclick="${stop}renameSvc('${ip}',${s.port})">✎</button>`;
  const eye=`<button class="eye" title="${hidden?"显示":"隐藏"}" onclick="${stop}toggleHidden('${ip}',${s.port})">${hidden?"🚫":"👁"}</button>`;
  const del=`<button class="del" title="删除服务" onclick="${stop}deleteSvc('${ip}',${s.port})">✕</button>`;
  const style=`style="border-left-color:${cat.color}"`;
  const cls=`svc${url?" link":""}${hidden?" hidden":""}`;
  
  // 如果配置了 extUrl，则 🌐 图标加 active class，使得其一直高亮显示，且鼠标悬停时提示当前外网地址
  const extCls = extUrl ? "ext active" : "ext";
  const ext=url ? `<button class="${extCls}" title="设置外网地址 (当前: ${esc(extUrl || "未配置")})" onclick="${stop}setExtUrl('${ip}',${s.port})">🌐</button>` : "";
  
  return url
    ? `<span class="${cls}" ${style}><a href="${url}" target="_blank" rel="noopener" ${titleAttr} style="text-decoration:none;display:inline-flex;gap:6px;align-items:center">${inner}</a>${catSelect(ip,s.port,(STATE.settings.svc_cats||{})[ip+":"+s.port])}${pen}${eye}${del}${ext}</span>`
    : `<span class="${cls}" ${style} ${titleAttr}>${inner}${catSelect(ip,s.port,(STATE.settings.svc_cats||{})[ip+":"+s.port])}${pen}${eye}${del}${ext}</span>`;
}

function renderDockerStats(ct) {
  if (!ct) return "";
  const pills = [];
  if (ct.cpu) {
    const m = ct.cpu.match(/([0-9.]+)\s*%/);
    if (m) {
      const v = parseFloat(m[1]);
      const c = v > 80 ? "crit" : v > 40 ? "warn" : "ok";
      pills.push(`<span class="ds-pill ${c}" title="CPU ${v}%"><span class="ds-lbl">CPU</span>${v}%</span>`);
    }
  }
  if (ct.mem) {
    const pm = ct.mem.match(/\(([0-9.]+)%\)/), mm = ct.mem.match(/([0-9.]+)\s*MB/);
    if (mm) {
      const mb = parseFloat(mm[1]), pct = pm ? parseFloat(pm[1]) : 0;
      const c = pct > 85 ? "crit" : pct > 55 ? "warn" : "ok";
      pills.push(`<span class="ds-pill ${c}" title="内存 ${mb}MB (${pct}%)"><span class="ds-lbl">MEM</span>${mb}M</span>`);
    }
  }
  return pills.length ? `<span class="ds-pills">${pills.join("")}</span>` : "";
}

function containerRow(ip, ct){
  const pub=(ct.ports||[]).filter(p=>p.public);
  const links=pub.map(p=>{
    const scheme=HTTPS_PORTS.has(p.public)?"https":"http";
    return `<a class="cport" href="${scheme}://${ip}:${p.public}" target="_blank" rel="noopener"
      title="${p.public}→${p.private||"?"}/${p.type||"tcp"}">${p.public}<span style="opacity:.5">↗</span></a>`;
  }).join("");
  const internal=(ct.ports||[]).filter(p=>!p.public)
    .map(p=>`<span class="cport int" title="未发布到宿主机">${p.private}</span>`).join("");
  const stopped=ct.state && ct.state!=="running";
  
  let statsHtml = "";
  if (!stopped) {
    statsHtml = renderDockerStats(ct);
    if (ct.status) {
      statsHtml += ` <span class="ds-stopped" style="margin-left:4px">· ${esc(ct.status.replace("Up ", ""))}</span>`;
    }
  } else {
    statsHtml = `<span class="ds-stopped">已停止 (${ct.state || "exited"})</span>`;
  }
  
  const dockerPort = getDockerPortForHost(ip);
  const ctrlBtn = stopped
    ? `<button class="btn-ct-ctrl start" title="启动" onclick="event.stopPropagation();controlContainer('${ip}', ${dockerPort}, '${ct.id || ct.name}', 'start')">▶</button>`
    : `<button class="btn-ct-ctrl stop" title="停止" onclick="event.stopPropagation();controlContainer('${ip}', ${dockerPort}, '${ct.id || ct.name}', 'stop')">⏹</button>`;
  
  return `<div class="ct ${stopped?"stopped":""}">
    <span class="ct-name">🐳 ${esc(ct.name)} ${ctrlBtn}</span>
    <div class="ct-ports">${links||internal||`<span class="cport int">—</span>`}</div>
    <span class="ct-img" style="margin-top:2px">${esc(ct.image||"")} ${statsHtml ? `· ${statsHtml}` : ""}</span>
  </div>`;
}

// 导航 / launchpad: only things you can actually open — web services and
// published docker ports — as a clean address book grouped by category.
function navView(hosts, showHidden){
  const renames=STATE.settings.renames||{}, hiddenSet=new Set(STATE.settings.hidden||[]);
  const dockerPub=new Set(), items=[];
  const pushItem=(cat,key,name,url,host,ip,port,hidden,isDocker,container)=>{
    if(activeCat && cat.id!==activeCat) return;
    if(hidden && !showHidden) return;
    items.push({cat,key,name,url,host,ip,port,hidden,isDocker,container});
  };
  for(const h of hosts){ if(!h.is_up) continue;
    for(const ct of (h.containers||[])){
      for(const p of (ct.ports||[])){
        if(!p.public) continue;
        const key=h.ip+":"+p.public; dockerPub.add(key);
        const cat=catForSvc(h.ip,{port:p.public,name:""});
        const hid=hiddenSet.has(key) || cat.visible===false;
        const extUrl=(STATE.settings.ext_urls||{})[key];
        const scheme=HTTPS_PORTS.has(p.public)?"https":"http";
        const url=extUrl || `${scheme}://${h.ip}:${p.public}`;
        pushItem(cat,key,renames[key]||ct.name,url,h,h.ip,p.public,hid,true,ct);
      }
    }
    for(const s of (h.services||[])){
      const url=svcUrl(h.ip,s); if(!url) continue;
      const key=h.ip+":"+s.port;
      if(dockerPub.has(key)) continue;
      pushItem(catForSvc(h.ip,s),key,svcName(h.ip,s),url,h,h.ip,s.port,isHidden(h.ip,s),false);
    }
  }
  if(!items.length) return `<div class="empty">没有可访问的服务。切换到「服务」视图查看完整结果，或点击「扫描」。</div>`;
  const order=[...sortedCats(),UNCAT];
  return order.map(c=>{
    const k=STATE.settings.host_sort;
    const its=items.filter(i=>i.cat.id===c.id).sort((a,b)=>{
      if(k==="label") return (a.name||a.ip).localeCompare(b.name||b.ip);
      if(k==="services") return (b.host.services||[]).length-(a.host.services||[]).length;
      if(k==="last_seen") return (b.host.last_seen||0)-(a.host.last_seen||0);
      const xa=a.ip.split(".").map(Number),xb=b.ip.split(".").map(Number);
      for(let i=0;i<4;i++){if(xa[i]!==xb[i])return xa[i]-xb[i];} return a.port-b.port;
    });
    if(!its.length) return "";
    return `<div class="cat-section">
      <div class="cat-head"><span class="swatch" style="background:${c.color}"></span>
        <h2>${esc(c.name)}</h2><span class="count">${its.length}</span></div>
      <div class="apps">${its.map(appCard).join("")}</div></div>`;
  }).join("");
}
function appCard(it){
  const stop="event.preventDefault();event.stopPropagation();";
  const del = !it.isDocker ? `<button class="del" title="删除服务" onclick="${stop}deleteSvc('${it.ip}',${it.port})">✕</button>` : "";
  const key = it.ip + ":" + it.port;
  const extUrl = (STATE.settings.ext_urls || {})[key];
  const scheme = HTTPS_PORTS.has(it.port) ? "https" : "http";
  const lanUrl = `${scheme}://${it.ip}:${it.port}`;
  const extCls = extUrl ? "ext active" : "ext";
  const ext = `<button class="${extCls}" title="设置外网地址 (当前: ${esc(extUrl || "未配置")})" onclick="${stop}setExtUrl('${it.ip}',${it.port})">🌐</button>`;

  let statsHtml = "";
  if (it.isDocker && it.container) {
    const ct = it.container;
    const stopped = ct.state && ct.state !== "running";
    const dockerPort = getDockerPortForHost(it.ip);
    const btn = stopped
      ? `<button class="btn-ct-ctrl start" title="启动" style="margin-left:4px;font-size:10px" onclick="${stop}controlContainer('${it.ip}', ${dockerPort}, '${ct.id || ct.name}', 'start')">▶</button>`
      : `<button class="btn-ct-ctrl stop" title="停止" style="margin-left:4px;font-size:10px" onclick="${stop}controlContainer('${it.ip}', ${dockerPort}, '${ct.id || ct.name}', 'stop')">⏹</button>`;
    statsHtml = (stopped
      ? `<span class="ds-stopped">已停止</span>`
      : renderDockerStats(ct)) + btn;
  }

  let urlBlock = "";
  if (extUrl) {
    urlBlock = `
      <div class="app-url-line" onclick="event.stopPropagation();">
        <span class="url-tag wan">WAN</span>
        <a href="${esc(extUrl)}" target="_blank" rel="noopener">${esc(extUrl)}</a>
      </div>
      <div class="app-url-line" onclick="event.stopPropagation();">
        <span class="url-tag lan">LAN</span>
        <a class="lan-link" href="${esc(lanUrl)}" target="_blank" rel="noopener">${esc(lanUrl)}</a>
      </div>`;
  } else if (it.url) {
    urlBlock = `
      <div class="app-url-line" onclick="event.stopPropagation();">
        <a href="${esc(lanUrl)}" target="_blank" rel="noopener">${esc(lanUrl)}</a>
      </div>`;
  } else {
    urlBlock = `<div class="app-url-line"><span style="opacity:.5">${esc(it.ip)}:${it.port}</span></div>`;
  }

  return `<div class="app ${it.hidden?"hidden":""}" onclick="window.open('${it.url}', '_blank', 'noopener')"
      style="--ac:${it.cat.color}; cursor: pointer;">
    <div class="acts" onclick="event.stopPropagation();" onmousedown="event.stopPropagation();">
      ${catSelect(it.ip,it.port,(STATE.settings.svc_cats||{})[it.ip+":"+it.port])}
      <button class="pencil" title="重命名" onclick="${stop}renameSvc('${it.ip}',${it.port})">✎</button>
      <button class="eye" title="${it.hidden?"显示":"隐藏"}" onclick="${stop}toggleHidden('${it.ip}',${it.port})">${it.hidden?"🚫":"👁"}</button>
      ${del}
      ${ext}
    </div>
    <div class="an">${esc(it.name)}</div>
    ${urlBlock}
    ${statsHtml ? `<div onclick="event.stopPropagation();">${statsHtml}</div>` : ""}
  </div>`;
}

function hostView(hosts, showHidden){
  const cards = sortHosts(hosts).map(h=>{
    if(!h.is_up) return "";
    const nonWeb=(h.services||[]).filter(s=>!svcUrl(h.ip,s));
    if(!nonWeb.length) return "";
    const svcs=nonWeb.slice()
      .sort((a,b)=> (catForSvc(h.ip,a).order-catForSvc(h.ip,b).order) || (a.port-b.port))
      .map(s=>svcChip(h.ip,s,showHidden)).join("");
    if(activeCat && !svcs) return "";
    const sub=[h.hostname,h.mac].filter(Boolean).map(esc).join(" · ");
    return `<div class="card">
      <div class="top"><span class="dot"></span>
        <div style="flex:1;min-width:0">
          <input class="label-input" placeholder="未命名设备" value="${esc(h.label||"")}"
            onchange="saveLabel('${h.ip}',this.value)">
          <div class="ip">${h.ip}</div>
          ${sub?`<div class="host-sub">${sub}</div>`:""}
          ${h.vendor?`<div class="vendor">${esc(h.vendor)}</div>`:""}
        </div></div>
      <div class="services">${svcs}</div>
    </div>`;
  }).filter(Boolean).join("");
  return cards ? `<div class="grid">${cards}</div>` : `<div class="empty">没有非 Web 服务。所有已发现的服务都可以通过浏览器直接访问，已显示在「导航」中。</div>`;
}

/* ---- settings modal ---- */
function openSettings(){
  const s=STATE.settings;
  document.getElementById("f_targets").value=s.targets;
  document.getElementById("f_full").value=s.full_targets||"";
  document.getElementById("f_docker_hosts").value=s.docker_hosts||"";
  document.getElementById("f_ports").value=s.ports;
  document.getElementById("f_interval").value=Math.round(s.interval/60);
  document.getElementById("f_timing").value=s.timing;
  document.getElementById("f_sv").checked=s.service_detection;
  document.getElementById("f_pn").checked=s.skip_discovery;
  document.getElementById("f_docker").checked=s.docker_probe;
  document.getElementById("f_mode").value=localStorage.getItem('ui_mode')||'auto';
  const curStyle=localStorage.getItem('ui_style')||'cyberpunk';
  document.querySelectorAll('.theme-opt').forEach(el=>el.classList.toggle('on',el.id==='topt_'+curStyle));
  document.getElementById("overlay").classList.add("show");
}
function closeSettings(){ document.getElementById("overlay").classList.remove("show"); }

// dedicated 分类 editor
function openCats(){
  EDIT_CATS=JSON.parse(JSON.stringify(STATE.settings.categories||[]));
  renderCatEditor();
  document.getElementById("catOverlay").classList.add("show");
}
function closeCats(){ document.getElementById("catOverlay").classList.remove("show"); }
function saveCats(){
  EDIT_CATS.forEach((c,k)=>c.order=k+1);
  saveSettings({categories:EDIT_CATS});
  closeCats();
}
let dragIdx = null;
let _catDragging = false;
function dragCat(e, i) { dragIdx = i; _catDragging = true; e.dataTransfer.effectAllowed = 'move'; }
function dragOverCat(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dragEndCat() { _catDragging = false; dragIdx = null; }
function dropCat(e, i) {
  e.preventDefault();
  _catDragging = false;
  if (dragIdx === null || dragIdx === i) { dragIdx = null; return; }
  const item = EDIT_CATS.splice(dragIdx, 1)[0];
  EDIT_CATS.splice(i, 0, item);
  dragIdx = null;
  EDIT_CATS.forEach((c,k)=>c.order=k+1);
  renderCatEditor();
}

function renderCatEditor(){
  EDIT_CATS.sort((a,b)=>a.order-b.order);
  document.getElementById("catEditor").innerHTML=EDIT_CATS.map((c,i)=>`
    <div class="cat-row" ondragover="dragOverCat(event)" ondrop="dropCat(event, ${i})">
      <div class="drag-handle" style="color:var(--muted);padding:0 4px;cursor:grab" draggable="true" ondragstart="dragCat(event, ${i})" ondragend="dragEndCat()">☰</div>
      <input type="color" value="${c.color}" onchange="EDIT_CATS[${i}].color=this.value">
      <input type="text" value="${esc(c.name)}" placeholder="名称" oninput="EDIT_CATS[${i}].name=this.value">
      <input type="text" value="${(c.ports||[]).join(',')}" placeholder="端口" oninput="EDIT_CATS[${i}].ports=this.value.split(',').map(x=>parseInt(x)).filter(Boolean)">
      <input type="text" value="${(c.services||[]).join(',')}" placeholder="服务名" oninput="EDIT_CATS[${i}].services=this.value.split(',').map(x=>x.trim()).filter(Boolean)">
      <div style="display:flex;gap:4px;align-items:center">
        <button class="mini" title="显示/隐藏" onclick="EDIT_CATS[${i}].visible=!EDIT_CATS[${i}].visible;renderCatEditor()">${c.visible!==false?"👁":"🚫"}</button>
        <button class="mini" onclick="EDIT_CATS.splice(${i},1);renderCatEditor()">✕</button>
      </div>
    </div>`).join("");
}
function moveCat(i,d){ const j=i+d; if(j<0||j>=EDIT_CATS.length) return;
  [EDIT_CATS[i],EDIT_CATS[j]]=[EDIT_CATS[j],EDIT_CATS[i]];
  EDIT_CATS.forEach((c,k)=>c.order=k+1); renderCatEditor(); }
function addCat(){ EDIT_CATS.push({id:"cat"+Date.now(),name:"新分类",color:"#888",
  order:EDIT_CATS.length+1,visible:true,ports:[],services:[]}); renderCatEditor(); }
function saveSettingsForm(){
  EDIT_CATS.forEach((c,k)=>c.order=k+1);
  saveSettings({
    targets:document.getElementById("f_targets").value,
    full_targets:document.getElementById("f_full").value,
    docker_hosts:document.getElementById("f_docker_hosts").value,
    ports:document.getElementById("f_ports").value,
    interval:(parseInt(document.getElementById("f_interval").value)||0)*60,
    timing:document.getElementById("f_timing").value,
    service_detection:document.getElementById("f_sv").checked,
    skip_discovery:document.getElementById("f_pn").checked,
    docker_probe:document.getElementById("f_docker").checked,
  });
  closeSettings();
}

function setStyle(style) {
  const root = document.documentElement;
  localStorage.setItem('ui_style', style);
  root.classList.remove('theme-minimal', 'theme-bento');
  if (style === 'minimal') root.classList.add('theme-minimal');
  else if (style === 'bento') root.classList.add('theme-bento');
  document.querySelectorAll('.theme-opt').forEach(el => el.classList.toggle('on', el.id === 'topt_' + style));
}

function setMode(mode) {
  const root = document.documentElement;
  localStorage.setItem('ui_mode', mode);
  root.classList.remove('dark-theme', 'light-theme');
  if (mode === 'dark') root.classList.add('dark-theme');
  else if (mode === 'light') root.classList.add('light-theme');
  const btn = document.getElementById('modeBtn');
  if (btn) btn.textContent = mode === 'dark' ? '🌙' : mode === 'light' ? '☀️' : '🌗';
}

function toggleMode() {
  const modes = ['auto', 'light', 'dark'];
  const cur = localStorage.getItem('ui_mode') || 'auto';
  setMode(modes[(modes.indexOf(cur) + 1) % modes.length]);
}

async function deleteSvc(ip, port) {
  if (!confirm(`确认要删除 ${ip}:${port} 上的服务吗？`)) return;
  try {
    const res = await fetch(`/api/host/${ip}/delete_service`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ port: parseInt(port) })
    });
    if (res.ok) {
      const host = STATE.hosts.find(h => h.ip === ip);
      if (host && host.services) {
        host.services = host.services.filter(s => s.port !== port);
      }
      render();
    } else {
      alert("删除服务失败");
    }
  } catch (e) {
    alert("删除服务发生错误");
  }
}

async function addDockerAddressFromSettings(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  const addr = prompt("请输入 Docker 守护进程地址（例如 10.1.6.15 或 10.1.6.15:2375）：");
  if (!addr || !addr.trim()) return;
  
  const btn = document.getElementById("addDockerBtn");
  const oldText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "探测中…";
  
  try {
    const res = await fetch("/api/docker/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ address: addr.trim() })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      alert(`成功连接到 Docker，发现 ${data.containers_count} 个容器！`);
      const input = document.getElementById("f_docker_hosts");
      const current = input.value.trim();
      const clean_address = `${data.ip}:${data.port}`;
      if (!current.includes(clean_address) && !current.includes(data.ip)) {
        input.value = current ? `${current} ${clean_address}` : clean_address;
      }
      load();
    } else {
      alert(`添加 Docker 失败：${data.error || '未知错误'}`);
    }
  } catch (e) {
    alert("网络请求失败，请检查服务状态");
  } finally {
    btn.disabled = false;
    btn.textContent = oldText;
  }
}

function openAddSvc(){
  document.getElementById("f_svc_ip").value = "";
  document.getElementById("f_svc_port").value = "";
  document.getElementById("f_svc_name").value = "";
  const sel = document.getElementById("f_svc_cat");
  sel.innerHTML = '<option value="">默认（按端口自动匹配）</option>' +
    allCats().map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("");
  document.getElementById("svcOverlay").classList.add("show");
}
function closeAddSvc(){ document.getElementById("svcOverlay").classList.remove("show"); }
async function submitAddSvc(){
  const ip = document.getElementById("f_svc_ip").value.trim();
  const port = parseInt(document.getElementById("f_svc_port").value);
  const name = document.getElementById("f_svc_name").value.trim();
  
  if(!ip || isNaN(port) || !name){
    alert("请完整填写 IP、端口和服务名称");
    return;
  }
  
  try {
    const catId = document.getElementById("f_svc_cat").value;
    const res = await fetch("/api/service/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ip, port, name })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      if (catId) await assignCat(ip, port, catId);
      closeAddSvc();
      load();
    } else {
      alert("添加服务失败：" + (data.error || "未知错误"));
    }
  } catch (e) {
    alert("网络请求失败");
  }
}

async function setExtUrl(ip, port){
  const key = ip + ":" + port, cur = (STATE.settings.ext_urls || {})[key] || "";
  const url = prompt("请输入该服务的广域网/外网访问地址（例如 http://wan.myip.com:8080，留空清除）：", cur);
  if (url === null) return;
  const u = { ... (STATE.settings.ext_urls || {}) };
  if (url.trim()) u[key] = url.trim(); else delete u[key];
  saveSettings({ ext_urls: u });
}

function getDockerPortForHost(ip) {
  const host = STATE.hosts.find(h => h.ip === ip);
  if (host && host.services) {
    const svc = host.services.find(s => s.name === "docker" || s.port === 2375 || s.port === 2376);
    if (svc) return svc.port;
  }
  return 2375;
}

async function controlContainer(ip, port, containerId, action) {
  if (!confirm(`确认要${action==="start"?"启动":"停止"}容器吗？`)) return;
  const btn = event.currentTarget;
  const oldText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = "…";
  
  try {
    const res = await fetch("/api/docker/control", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ip, port, id: containerId, action })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      await load();
    } else {
      alert(`操作失败：${data.error || "未知错误"}`);
      btn.disabled = false;
      btn.innerHTML = oldText;
    }
  } catch (e) {
    alert("网络请求失败，请检查服务状态");
    btn.disabled = false;
    btn.innerHTML = oldText;
  }
}

document.getElementById("search").addEventListener("input", render);
document.addEventListener("focusout", ()=>{ if(_renderPending) setTimeout(()=>render(true), 80); });
setMode(localStorage.getItem('ui_mode') || 'auto');
load();
